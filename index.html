<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>4.41 Registro de Ofrendas – Casa de Oración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin: 0.5rem 0 1rem 0;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .logo img {
      max-width: 180px;
      height: auto;
      border-radius: 8px;
    }
    form {
      background: #ffffff;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input, textarea, select {
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #4a90e2;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:active {
      transform: translateY(1px);
    }
    .btn-guardar {
      background: #4caf50;
      color: #fff;
    }
    .btn-datos {
      background: #1976d2;
      color: #fff;
    }
    .btn-datos[disabled] {
      background: #b0bec5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }
    .status.ok {
      color: #2e7d32;
    }
    .status.error {
      color: #c62828;
    }

    /* Quitar flechas de los inputs numéricos */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    .graphs-container {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #graficoContainer {
      margin-top: 1rem;
      width: 100%;
      height: 360px; /* alto fijo cómodo para el gráfico */
      display: none;
      background: #ffffff;
      border-radius: 12px;
      padding: 0.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    #graficoCanvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="CasaDeOracionLogo.jpg" alt="Casa de Oración">
  </div>

  <h1>Registro de Ofrendas</h1>

  <form id="ofrendaForm">
    <!-- Concepto -->
    <label for="conceptoSelect">Concepto</label>
    <select id="conceptoSelect" name="conceptoSelect" required>
      <option value="" disabled selected>Seleccioná un concepto</option>
      <option value="Culto Principal">Culto Principal</option>
      <option value="Culto de Oración">Culto de Oración</option>
      <option value="Otro">Otro</option>
    </select>

    <div id="conceptoOtroContainer" style="display:none; margin-top:0.5rem;">
      <label for="conceptoOtro">Especificar concepto</label>
      <input
        type="text"
        id="conceptoOtro"
        name="conceptoOtro"
        placeholder="Ej: Actividad especial, misioneros..."
      />
    </div>

    <!-- Monto -->
    <label for="monto">Monto (₡)</label>
    <input
      type="number"
      id="monto"
      name="monto"
      required
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
    />

    <!-- Asistencia -->
    <label for="asistencia">Asistencia</label>
    <input
      type="number"
      id="asistencia"
      name="asistencia"
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="Cantidad de personas"
    />

    <!-- Notas -->
    <label for="notas">Notas</label>
    <textarea
      id="notas"
      name="notas"
      placeholder="Detalles adicionales (opcional)"
    ></textarea>

    <button type="submit" class="btn-guardar">Guardar</button>
    <div id="status" class="status"></div>
  </form>

  <!-- Botones para ver gráficos (CO / CP) -->
  <div class="graphs-container">
    <button id="verCOBtn" class="btn-datos" disabled>
      Ver gráfico CO (Culto de Oración)
    </button>
    <button id="verCPBtn" class="btn-datos" disabled>
      Ver gráfico CP (Culto Principal)
    </button>
  </div>

  <!-- Contenedor del gráfico en HTML -->
  <div id="graficoContainer">
    <canvas id="graficoCanvas"></canvas>
  </div>

  <script>
    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbz0Mo9Iudj9okE7LEprM-Z6rQpTQ6wh5Hcl0-MfAgF4HMt672RT_PzU5WnnFQACGwFhLQ/exec";

    const form = document.getElementById("ofrendaForm");
    const statusEl = document.getElementById("status");
    const verCOBtn = document.getElementById("verCOBtn");
    const verCPBtn = document.getElementById("verCPBtn");
    const graficoContainer = document.getElementById("graficoContainer");
    const graficoCanvas = document.getElementById("graficoCanvas");

    const conceptoSelect = document.getElementById("conceptoSelect");
    const conceptoOtroContainer = document.getElementById("conceptoOtroContainer");
    const conceptoOtroInput = document.getElementById("conceptoOtro");
    const asistenciaInput = document.getElementById("asistencia");

    let graficoChart = null;

    // Mostrar/ocultar campo "Otro"
    conceptoSelect.addEventListener("change", () => {
      if (conceptoSelect.value === "Otro") {
        conceptoOtroContainer.style.display = "block";
      } else {
        conceptoOtroContainer.style.display = "none";
        conceptoOtroInput.value = "";
      }
    });

    // Envío del formulario (registrar ofrenda)
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Enviando...";
      statusEl.className = "status";

      const montoRaw = document.getElementById("monto").value;
      const monto = parseInt(montoRaw, 10);

      const conceptoSelectValue = conceptoSelect.value;
      const conceptoOtroValue = conceptoOtroInput.value.trim();

      const asistenciaRaw = asistenciaInput.value;
      const asistencia = asistenciaRaw ? parseInt(asistenciaRaw, 10) : "";

      const notas = document.getElementById("notas").value;

      if (isNaN(monto)) {
        statusEl.textContent = "⚠️ El monto debe ser un número entero.";
        statusEl.className = "status error";
        return;
      }

      if (!conceptoSelectValue) {
        statusEl.textContent = "⚠️ Debés seleccionar un concepto.";
        statusEl.className = "status error";
        return;
      }

      let conceptoFinal = conceptoSelectValue;
      if (conceptoSelectValue === "Otro") {
        if (!conceptoOtroValue) {
          statusEl.textContent = "⚠️ Especificá el concepto cuando elijas 'Otro'.";
          statusEl.className = "status error";
          return;
        }
        conceptoFinal = conceptoOtroValue;
      }

      const params = new URLSearchParams({
        monto: String(monto),
        concepto: conceptoFinal,
        asistencia: asistencia,
        notas: notas,
      });

      try {
        // Seguimos usando GET + no-cors para registrar (ya te funciona bien)
        await fetch(`${SCRIPT_URL}?${params.toString()}`, {
          method: "GET",
          mode: "no-cors",
        });

        statusEl.textContent = "✅ Ofrenda registrada.";
        statusEl.className = "status ok";
        form.reset();
        conceptoOtroContainer.style.display = "none";

        verCOBtn.disabled = false;
        verCPBtn.disabled = false;
      } catch (err) {
        statusEl.textContent = "❌ Error de conexión: " + err.toString();
        statusEl.className = "status error";
      }
    });

    // Cargar pivot desde Apps Script y dibujar gráfico
    async function cargarYMostrarGrafico(tipo, titulo) {
      try {
        statusEl.textContent = "Cargando gráfico...";
        statusEl.className = "status";

        const url = `${SCRIPT_URL}?mode=pivot&tipo=${encodeURIComponent(tipo)}`;
        const res = await fetch(url); // aquí SÍ necesitamos leer la respuesta
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const headers = data.headers || [];
        let rows = data.rows || [];

        // Filtramos filas vacías
        rows = rows.filter(r => r && r[0] !== "" && r[1] !== "" && r[1] != null);

        if (!rows.length) {
          statusEl.textContent = "⚠️ No hay datos para este gráfico.";
          statusEl.className = "status error";
          graficoContainer.style.display = "none";
          return;
        }

        // Asumimos: columna 0 = etiqueta (ej. fecha), columna 1 = valor (ej. monto)
        const labels = rows.map(r => String(r[0]));
        const values = rows.map(r => Number(r[1]) || 0);

        graficoContainer.style.display = "block";

        // Destruir gráfico previo si existe
        if (graficoChart) {
          graficoChart.destroy();
        }

        graficoChart = new Chart(graficoCanvas.getContext("2d"), {
          type: "bar",
          data: {
            labels,
            datasets: [
              {
                label: titulo || headers[1] || "Valor",
                data: values,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
              },
            },
          },
        });

        statusEl.textContent = "";
        statusEl.className = "status";
      } catch (err) {
        statusEl.textContent = "❌ Error cargando gráfico: " + err.toString();
        statusEl.className = "status error";
        graficoContainer.style.display = "none";
      }
    }

    // Botones de gráficos
    verCOBtn.addEventListener("click", () => {
      cargarYMostrarGrafico("CO", "Culto de Oración");
    });

    verCPBtn.addEventListener("click", () => {
      cargarYMostrarGrafico("CP", "Culto Principal");
    });
  </script>
</body>
</html>
