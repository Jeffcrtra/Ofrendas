<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>1.50 Ofrendas Analytics</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#ffffff;
      --ink:#0b1220;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 16px 45px rgba(0,0,0,.18);
      --btn:#111827;
      --soft:#f3f4f6;
      --soft2:#f9fafb;
      --ok:#10b981;
      --bad:#ef4444;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:var(--font);
      background:
        radial-gradient(1000px 600px at 20% 0%, rgba(59,130,246,.25), transparent 60%),
        radial-gradient(900px 600px at 80% 10%, rgba(16,185,129,.18), transparent 60%),
        var(--bg);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:14px;
      color:var(--ink);
    }

    .frame{
      width:min(980px, 100%);
      background:var(--card);
      border-radius:26px;
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    
      /* ✅ antes: min-height:86vh; */
      align-self:center;
    }

    header{
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, var(--soft2), #fff);
      gap:12px;
    }

    .head-left{display:flex; gap:12px; align-items:center;}
    .logo{
      width:44px; height:44px;
      border-radius:12px;
      background:var(--soft);
      border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
    }

    .titles{display:flex; flex-direction:column;}
    .titles .h1{font-weight:900; font-size:16px;}
    .titles .h2{font-size:12px; color:var(--muted);}

    .iconbtn{
      width:40px; height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-size:18px;
    }

    /* STATUS BAR */
    .status{
      font-size:12px;
      padding:6px 14px;
      border-bottom:1px solid var(--line);
      background:#f1f5f9;
      color:#334155;
    }
    .status.loading{ background:#eff6ff; color:#1e40af; }
    .status.ok{ background:#ecfdf5; color:#065f46; }
    .status.error{ background:#fef2f2; color:#7f1d1d; }

    main{
      padding:18px;
      display:flex;
      flex-direction:column;
    }

    .hide{ display:none !important; }

    /* Screens */
    .screen{
      opacity:0;
      transform:translateY(8px);
      transition:opacity .14s ease, transform .14s ease;
    }
    .screen.active{
      opacity:1;
      transform:translateY(0);
    }

    /* LOGIN */
    #screen-login{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .loginwrap{
      width:100%;
      max-width:420px;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }

    label{font-size:12px; color:var(--muted);}
    input{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      margin-top:6px;
      font-size:14px;
    }

    .btn{
      width:100%;
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      border:0;
      background:var(--btn);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,.18);
    }

    .btn[disabled]{ opacity:.75; cursor:not-allowed; }

    .spinner{
      width:16px; height:16px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.35);
      border-top-color:#fff;
      display:inline-block;
      margin-left:8px;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    .login-state{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }

    /* HOME */
    .card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin:12px 0;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:transform .06s ease;
    }
    .card:active{ transform:translateY(1px); }

    footer{
      border-top:1px solid var(--line);
      padding:12px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }

    /* DRAWER */
    .drawer-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      z-index:50;
    }

    .drawer{
      position:fixed;
      right:0; top:0;
      height:100vh;
      width:min(360px, 92vw);
      background:#fff;
      border-left:1px solid var(--line);
      box-shadow:-18px 0 45px rgba(0,0,0,.22);
      z-index:60;
      transform:translateX(100%);
      transition:transform .18s ease;
      display:flex;
      flex-direction:column;
    }
    .drawer.show{ transform:translateX(0); }

    .drawer-head{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
    }

    .drawer-items{
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .drawer-item{
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .drawer-item.danger{
      background:rgba(239,68,68,.08);
      border-color:rgba(239,68,68,.35);
      color:#7f1d1d;
    }
  </style>
</head>

<body>
<div class="frame">

<header>
  <div class="head-left">
    <div class="logo">OA</div>
    <div class="titles">
      <div class="h1">Ofrendas Analytics</div>
      <div class="h2" id="subtitle">Acceso · Módulo de Ofrendas</div>
    </div>
  </div>
  <button class="iconbtn" onclick="openMenu()">≡</button>
</header>

<div id="statusBar" class="status hide"></div>

<main>

<!-- LOGIN -->
<section id="screen-login" class="screen active">
  <div class="loginwrap">
    <h3>Iniciar sesión</h3>

    <form onsubmit="event.preventDefault(); login();">
      <label>Usuario</label>
      <input id="loginUser" autocomplete="username"/>

      <label style="margin-top:12px;">Password</label>
      <input id="loginPass" type="password" autocomplete="current-password"/>

      <button class="btn" id="btnLogin" type="submit">
        Entrar <span class="spinner hide"></span>
      </button>
    </form>

    <div id="loginState" class="login-state hide">🔐 Verificando acceso…</div>
    <div id="loginMsg"></div>
  </div>
</section>

<!-- HOME -->
<section id="screen-home" class="screen hide">
  <h3>¿Qué deseás hacer hoy?</h3>

  <div class="card" onclick="go('ingresar')">🔥 Ingresar Ofrenda</div>
  <div class="card" onclick="go('analisis')">📈 Ver Análisis</div>
  <div class="card" onclick="go('contacto')">💬 Contacto</div>
</section>

</main>

<footer>
  © 2025 Ofrendas Analytics · Creado por Jeffrey Trigueros<br/>
  ¿Querés esta aplicación para tu iglesia?
  <a href="https://www.linkedin.com/in/jeffrey-trigueros-371191123/" target="_blank" rel="noopener">
    Contactame por LinkedIn
  </a>
</footer>

</div>

<!-- DRAWER -->
<div id="drawerBackdrop" class="drawer-backdrop hide" onclick="closeDrawer()"></div>
<aside id="drawer" class="drawer hide">
  <div class="drawer-head">
    <strong>Menú</strong>
    <button class="iconbtn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-items">
    <button class="drawer-item" onclick="nav('home')">🏠 Home</button>
    <button class="drawer-item" onclick="nav('ingresar')">🔥 Ingresar</button>
    <button class="drawer-item" onclick="nav('analisis')">📈 Análisis</button>
    <button class="drawer-item" onclick="nav('contacto')">💬 Contacto</button>
    <button class="drawer-item danger" onclick="logout()">🚪 Cerrar sesión</button>
  </div>
</aside>

<script>
const API_URL = "PEGÁ_ACÁ_TU_WEB_APP_URL";

// Helpers
const $ = id => document.getElementById(id);
const LS = { token:"", usuario:"", iglesia:"", acceso:"" };

function setStatus(t,type){
  const el=$("statusBar");
  el.textContent=t;
  el.className="status "+type;
  el.classList.remove("hide");
}
function clearStatus(){ setTimeout(()=> $("statusBar").classList.add("hide"),1200); }

function showScreen(name){
  ["login","home"].forEach(s=>{
    const el=$("screen-"+s);
    el.classList.toggle("hide", s!==name);
    el.classList.toggle("active", s===name);
  });
}

// LOGIN
async function login(){
  $("loginState").classList.remove("hide");
  setStatus("Verificando acceso…","loading");
  $("btnLogin").disabled=true;

  // ⚠️ simulación visual, conectá tu api real aquí
  setTimeout(()=>{
    LS.usuario=$("loginUser").value;
    $("subtitle").textContent="Casa de Oración · Módulo de Ofrendas";
    showScreen("home");
    setStatus("Conectado correctamente","ok");
    clearStatus();
    $("btnLogin").disabled=false;
  },900);
}

// MENU
function openMenu(){
  $("drawerBackdrop").classList.remove("hide");
  $("drawer").classList.remove("hide");
  requestAnimationFrame(()=> $("drawer").classList.add("show"));
}
function closeDrawer(){
  $("drawer").classList.remove("show");
  setTimeout(()=>{
    $("drawer").classList.add("hide");
    $("drawerBackdrop").classList.add("hide");
  },180);
}
function nav(w){
  closeDrawer();
  go(w);
}
function go(w){
  if(w==="home") showScreen("home");
}
function logout(){
  location.reload();
}
</script>

</body>
</html>
