<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>3.25 Registro de Ofrendas – Casa de Oración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin: 0.5rem 0 1rem 0;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .logo img {
      max-width: 180px;
      height: auto;
      border-radius: 8px;
    }
    form {
      background: #ffffff;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input, textarea {
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: #4a90e2;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:active {
      transform: translateY(1px);
    }
    .btn-guardar {
      background: #4caf50;
      color: #fff;
    }
    .btn-datos {
      background: #1976d2;
      color: #fff;
    }
    .btn-datos[disabled] {
      background: #b0bec5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }
    .status.ok {
      color: #2e7d32;
    }
    .status.error {
      color: #c62828;
    }

    /* Quitar flechas de los inputs numéricos */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    .graphs-container {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="CasaDeOracionLogo.jpg" alt="Casa de Oración">
  </div>

  <h1>Registro de Ofrendas</h1>

  <form id="ofrendaForm">
    <!-- Fecha se pone automática en el servidor -->

    <label for="monto">Monto (₡)</label>
    <input
      type="number"
      id="monto"
      name="monto"
      required
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
    />

    <label for="concepto">Concepto</label>
    <input
      type="text"
      id="concepto"
      name="concepto"
      required
      placeholder="Diezmo, ofrenda, especial..."
    />

    <label for="notas">Notas</label>
    <textarea
      id="notas"
      name="notas"
      placeholder="Detalles adicionales (opcional)"
    ></textarea>

    <button type="submit" class="btn-guardar">Guardar</button>

    <div id="status" class="status"></div>
  </form>

  <!-- Botones para ver gráficos -->
  <div class="graphs-container">
    <button id="verCOBtn" class="btn-datos" disabled>
      Ver gráfico CO (Culto de Oración)
    </button>
    <button id="verCPBtn" class="btn-datos" disabled>
      Ver gráfico CP (Culto Principal)
    </button>
  </div>

  <script>
    // URL del Web App de Apps Script para guardar registros
    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbyiESV-GMfq48Tvts8BK8WOc3_jS4bU9tTlRoBxNpp-s-LN1O1Qf1cpL4y30wT94USCMQ/exec";

    // URLs de los gráficos publicados (pubchart)
    const GRAPH_CO_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8ApTb9ak2QTSVcswEo0vF655FuLZkmR75CZ2SpmgI0ZD_OtJaEGloAmytg6vJy-g-KovswTV2laHg/pubchart?oid=151386483&format=interactive";

    // 👉 Cambia esto por el pubchart real de CP cuando lo tengas:
    const GRAPH_CP_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8ApTb9ak2QTSVcswEo0vF655FuLZkmR75CZ2SpmgI0ZD_OtJaEGloAmytg6vJy-g-KovswTV2laHg/pubchart?oid=151386483&format=interactive";

    const form = document.getElementById("ofrendaForm");
    const statusEl = document.getElementById("status");
    const verCOBtn = document.getElementById("verCOBtn");
    const verCPBtn = document.getElementById("verCPBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Enviando...";
      statusEl.className = "status";

      const montoRaw = document.getElementById("monto").value;
      const monto = parseInt(montoRaw, 10);
      const concepto = document.getElementById("concepto").value;
      const notas = document.getElementById("notas").value;

      if (isNaN(monto)) {
        statusEl.textContent = "⚠️ El monto debe ser un número entero.";
        statusEl.className = "status error";
        return;
      }

      const params = new URLSearchParams({
        monto: String(monto),
        concepto: concepto,
        notas: notas,
      });

      try {
        await fetch(`${SCRIPT_URL}?${params.toString()}`, {
          method: "GET",
          mode: "no-cors", // disparamos la petición sin pelear con CORS
        });

        statusEl.textContent =
          "✅ Ofrenda registrada (ver hoja Ingresos / gráficos).";
        statusEl.className = "status ok";
        form.reset();

        // Habilitar los botones de gráficos
        verCOBtn.disabled = false;
        verCPBtn.disabled = false;
      } catch (err) {
        statusEl.textContent = "❌ Error de conexión real: " + err.toString();
        statusEl.className = "status error";
      }
    });

    // Abrir gráfico CO
    verCOBtn.addEventListener("click", () => {
      if (!GRAPH_CO_URL) {
        alert("Falta configurar la URL del gráfico CO.");
        return;
      }
      window.open(GRAPH_CO_URL, "_blank");
    });

    // Abrir gráfico CP
    verCPBtn.addEventListener("click", () => {
      if (!GRAPH_CP_URL) {
        alert("Falta configurar la URL del gráfico CP.");
        return;
      }
      window.open(GRAPH_CP_URL, "_blank");
    });
  </script>
</body>
</html>
