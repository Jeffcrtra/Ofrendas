<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>5.38 Registro de Ofrendas – Casa de Oración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js y plugin de data labels -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f5f5f5;
      transition: max-width 0.3s ease, padding 0.3s ease;
    }
    /* Cuando el gráfico está ampliado, el layout se ensancha */
    body.expanded-layout {
      max-width: 100%;
      padding: 0.8rem;
    }

    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin: 0.5rem 0 1rem 0;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .logo img {
      max-width: 180px;
      height: auto;
      border-radius: 8px;
    }
    form {
      background: #ffffff;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input, textarea, select {
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #4a90e2;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:active {
      transform: translateY(1px);
    }
    .btn-guardar {
      background: #4caf50;
      color: #fff;
    }
    .btn-accion {
      background: #1976d2;
      color: #fff;
    }
    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }
    .status.ok {
      color: #2e7d32;
    }
    .status.error {
      color: #c62828;
    }

    /* Quitar flechas de los inputs numéricos */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    .graphs-container {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: #ffffff;
      padding: 0.8rem 1rem 1rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    #graficoContainer {
      margin-top: 1rem;
      width: 100%;
      height: 360px;
      display: none;
      background: #ffffff;
      border-radius: 12px;
      padding: 0.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: height 0.3s ease;
    }
    #graficoContainer.expanded-chart {
      height: 75vh; /* modo grande, y el body ya es ancho */
    }

    #graficoCanvas {
      width: 100%;
      height: 65%;
    }

    #customLegend {
      margin-top: 0.8rem;  /* más espacio bajo el gráfico */
      font-size: 0.85rem;
    }

    #resumenBox {
      margin-top: 0.7rem;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      background: #e3f2fd; /* azul clarito */
      font-size: 0.9rem;
    }

    #creditLine {
      margin-top: 0.4rem;
      font-size: 0.8rem;
      opacity: 0.9;
      text-align: center;
    }
    #creditLine a {
      color: #1565c0;
      text-decoration: none;
      font-weight: 500;
    }
    #creditLine a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="CasaDeOracionLogo.jpg" alt="Casa de Oración">
  </div>

  <h1>Registro de Ofrendas</h1>

  <form id="ofrendaForm">
    <!-- Concepto -->
    <label for="conceptoSelect">Concepto</label>
    <select id="conceptoSelect" name="conceptoSelect" required>
      <option value="" disabled selected>Seleccioná un concepto</option>
      <option value="Culto Principal">Culto Principal</option>
      <option value="Culto de Oración">Culto de Oración</option>
      <option value="Otro">Otro</option>
    </select>

    <div id="conceptoOtroContainer" style="display:none; margin-top:0.5rem;">
      <label for="conceptoOtro">Especificar concepto</label>
      <input
        type="text"
        id="conceptoOtro"
        name="conceptoOtro"
        placeholder="Ej: Actividad especial, misioneros..."
      />
    </div>

    <!-- Monto -->
    <label for="monto">Monto (₡)</label>
    <input
      type="number"
      id="monto"
      name="monto"
      required
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
    />

    <!-- Asistencia -->
    <label for="asistencia">Asistencia</label>
    <input
      type="number"
      id="asistencia"
      name="asistencia"
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="Cantidad de personas"
    />

    <!-- Notas -->
    <label for="notas">Notas</label>
    <textarea
      id="notas"
      name="notas"
      placeholder="Detalles adicionales (opcional)"
    ></textarea>

    <button type="submit" class="btn-guardar">Guardar</button>
    <div id="status" class="status"></div>
  </form>

  <!-- Controles de gráfico -->
  <div class="graphs-container">
    <label for="tipoGrafico">Tipo de culto a visualizar</label>
    <select id="tipoGrafico">
      <option value="" selected>Seleccioná un tipo de culto</option>
      <option value="CO">Culto de Oración (CO)</option>
      <option value="CP">Culto Principal (CP)</option>
    </select>

    <button id="toggleSizeBtn" type="button" class="btn-accion">
      Ampliar gráfico
    </button>
  </div>

  <!-- Contenedor del gráfico en HTML -->
  <div id="graficoContainer">
    <canvas id="graficoCanvas"></canvas>
    <div id="customLegend"></div>

    <div id="resumenBox">
      <div id="resumenTexto"></div>
    </div>
  </div>

</div> <!-- cierre de graficoContainer -->
  
   <div id="appFooter" style="
    margin-top: 2rem;
    padding: 1rem 0;
    text-align: center;
    font-size: 0.85rem;
    color: #555;
    border-top: 1px solid #ccc;
    opacity: 0.9;
  ">
    © <span id="footerYear"></span> Ofrendas Analytics · Creado por 
    <a href="https://www.linkedin.com/in/jeffrey-trigueros-371191123/"
       target="_blank" rel="noopener noreferrer"
       style="color:#1565c0; text-decoration:none; font-weight:500;">
       Jeffrey Trigueros
    </a>
    <br>
    <span style="font-size:0.8rem;">
      ¿Querés esta aplicación para tu iglesia? Contáctame.
    </span>
  </div>

  <script>
    document.getElementById("footerYear").textContent = new Date().getFullYear();
    // Registrar plugin de datalabels en Chart.js
    Chart.register(ChartDataLabels);

    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbxGEAdbTqpSQlTBBibm0ulRHyZPj93A83bfeSyWuDG3Hcqmd4IdserjMgIPZjRDvOVW1Q/exec";

    const form = document.getElementById("ofrendaForm");
    const statusEl = document.getElementById("status");
    const conceptoSelect = document.getElementById("conceptoSelect");
    const conceptoOtroContainer = document.getElementById("conceptoOtroContainer");
    const conceptoOtroInput = document.getElementById("conceptoOtro");
    const asistenciaInput = document.getElementById("asistencia");
    const tipoGraficoSelect = document.getElementById("tipoGrafico");
    const toggleSizeBtn = document.getElementById("toggleSizeBtn");

    const graficoContainer = document.getElementById("graficoContainer");
    const graficoCanvas = document.getElementById("graficoCanvas");
    const resumenTexto = document.getElementById("resumenTexto");
    const customLegendEl = document.getElementById("customLegend");

    let graficoChart = null;

    // Config de colores por tipo de culto
    const configPorTipo = {
      CO: {
        label: "Culto de Oración",
        areaColor: "rgba(25, 118, 210, 0.35)",   // azul suave
        borderColor: "rgba(25, 118, 210, 1)",    // azul fuerte
      },
      CP: {
        label: "Culto Principal",
        areaColor: "rgba(239, 108, 0, 0.35)",    // naranja suave
        borderColor: "rgba(239, 108, 0, 1)",     // naranja fuerte
      },
    };

    const asistenciaColor = "rgba(46, 125, 50, 1)"; // verde

    // Helper: formatear fecha para el eje X
    function formatearFechaLabel(raw) {
      const d = new Date(raw);
      if (!isNaN(d.getTime())) {
        return d.toLocaleDateString("es-CR", {
          day: "2-digit",
          month: "2-digit",
        });
      }
      return String(raw);
    }

    // Mostrar/ocultar campo "Otro"
    conceptoSelect.addEventListener("change", () => {
      if (conceptoSelect.value === "Otro") {
        conceptoOtroContainer.style.display = "block";
      } else {
        conceptoOtroContainer.style.display = "none";
        conceptoOtroInput.value = "";
      }
    });

    // Envío del formulario (registrar ofrenda)
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Enviando...";
      statusEl.className = "status";

      const montoRaw = document.getElementById("monto").value;
      const monto = parseInt(montoRaw, 10);

      const conceptoSelectValue = conceptoSelect.value;
      const conceptoOtroValue = conceptoOtroInput.value.trim();

      const asistenciaRaw = asistenciaInput.value;
      const asistencia = asistenciaRaw ? parseInt(asistenciaRaw, 10) : "";

      const notas = document.getElementById("notas").value;

      if (isNaN(monto)) {
        statusEl.textContent = "⚠️ El monto debe ser un número entero.";
        statusEl.className = "status error";
        return;
      }

      if (!conceptoSelectValue) {
        statusEl.textContent = "⚠️ Debés seleccionar un concepto.";
        statusEl.className = "status error";
        return;
      }

      let conceptoFinal = conceptoSelectValue;
      if (conceptoSelectValue === "Otro") {
        if (!conceptoOtroValue) {
          statusEl.textContent =
            "⚠️ Especificá el concepto cuando elijas 'Otro'.";
          statusEl.className = "status error";
          return;
        }
        conceptoFinal = conceptoOtroValue;
      }

      const params = new URLSearchParams({
        monto: String(monto),
        concepto: conceptoFinal,
        asistencia: asistencia,
        notas: notas,
      });

      try {
        // Registrar ofrenda (no necesitamos leer respuesta)
        await fetch(`${SCRIPT_URL}?${params.toString()}`, {
          method: "GET",
          mode: "no-cors",
        });

        statusEl.textContent = "✅ Ofrenda registrada.";
        statusEl.className = "status ok";
        form.reset();
        conceptoOtroContainer.style.display = "none";

        // Si ya hay un tipo de gráfico seleccionado, refrescarlo
        const tipoActual = tipoGraficoSelect.value;
        if (tipoActual === "CO" || tipoActual === "CP") {
          cargarYMostrarGrafico(tipoActual);
        }
      } catch (err) {
        statusEl.textContent = "❌ Error de conexión: " + err.toString();
        statusEl.className = "status error";
      }
    });

    // Cargar pivot desde Apps Script y dibujar gráfico
    async function cargarYMostrarGrafico(tipo) {
      if (!tipo) {
        graficoContainer.style.display = "none";
        return;
      }

      try {
        const cfg = configPorTipo[tipo] || configPorTipo.CO;

        // Mostrar contenedor y mensaje de cargando
        graficoContainer.style.display = "block";
        resumenTexto.textContent = "Cargando gráfico...";
        customLegendEl.textContent = "";
        statusEl.textContent = "";
        statusEl.className = "status";

        const url = `${SCRIPT_URL}?mode=pivot&tipo=${encodeURIComponent(tipo)}`;
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const headers = data.headers || [];
        let rows = data.rows || [];

        // Filtrar filas vacías (asumimos: 0=fecha, 1=monto, 2=asistencia)
        rows = rows.filter(
          (r) => r && r[0] !== "" && r[1] !== "" && r[1] != null
        );

        if (!rows.length) {
          statusEl.textContent = "⚠️ No hay datos para este gráfico.";
          statusEl.className = "status error";
          graficoContainer.style.display = "none";
          return;
        }

        const labels = rows.map((r) => formatearFechaLabel(r[0]));
        const valoresMonto = rows.map((r) => Number(r[1]) || 0);
        const valoresAsistencia = rows.map((r) =>
          r.length > 2 ? Number(r[2]) || 0 : 0
        );

        // Destruir gráfico previo si existe
        if (graficoChart) {
          graficoChart.destroy();
        }

        const ctx = graficoCanvas.getContext("2d");

        graficoChart = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "Ofrendas (₡)",
                data: valoresMonto,
                borderColor: cfg.borderColor,
                backgroundColor: cfg.areaColor,
                borderWidth: 2,
                fill: true,              // área
                stepped: "middle",       // área escalonada
                yAxisID: "y",
                tension: 0,
                datalabels: {
                  anchor: "end",
                  align: "top",
                  formatter: (value) => {
                    if (!value) return "";
                    return new Intl.NumberFormat("es-CR", {
                      maximumFractionDigits: 0,
                    }).format(value);
                  },
                },
              },
              {
                label: "Asistencia",
                data: valoresAsistencia,
                borderColor: "rgba(46, 125, 50, 1)",
                backgroundColor: "transparent",
                borderWidth: 2,
                fill: false,
                yAxisID: "y1",
                tension: 0.2,
                pointRadius: 3,
                datalabels: {
                  anchor: "end",
                  align: "bottom",
                  formatter: (value) => (value ? value : ""),
                },
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              datalabels: {
                color: "#222",
                font: {
                  size: 9,
                },
                clamp: true,
                clip: true,
              },
              legend: {
                display: false, // usamos leyenda personalizada
              },
              title: {
                display: true,
                text: cfg.label,
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                position: "left",
                title: {
                  display: true,
                  text: "Ofrendas (₡)",
                },
              },
              y1: {
                beginAtZero: true,
                position: "right",
                grid: {
                  drawOnChartArea: false,
                },
                title: {
                  display: true,
                  text: "Asistencia",
                },
              },
            },
          },
        });

        // Leyenda personalizada
        customLegendEl.innerHTML = `
          <div style="margin-bottom:4px;">
            <span style="display:inline-block;width:14px;height:10px;background:${cfg.areaColor};border:2px solid ${cfg.borderColor};border-radius:2px;margin-right:4px;"></span>
            Ofrendas (área escalonada)
          </div>
          <div>
            <span style="display:inline-block;width:14px;height:0;border-top:2px solid rgba(46,125,50,1);margin-right:4px;position:relative;top:-2px;"></span>
            Asistencia (línea verde)
          </div>
        `;

        // Texto de análisis: 3 líneas (promedio, asistencia, tendencia)
        const sumMonto = valoresMonto.reduce((a, b) => a + b, 0);
        const avgMonto = sumMonto / valoresMonto.length;

        const sumAsist = valoresAsistencia.reduce((a, b) => a + b, 0);
        const validAsist = valoresAsistencia.filter((v) => v > 0);
        const avgAsist =
          validAsist.length > 0 ? sumAsist / validAsist.length : 0;

        const first = valoresMonto[0];
        const last = valoresMonto[valoresMonto.length - 1];
        let tendencia = "estable";
        if (last > first * 1.1) tendencia = "al alza";
        else if (last < first * 0.9) tendencia = "a la baja";

        const formatterCRC = new Intl.NumberFormat("es-CR", {
          style: "currency",
          currency: "CRC",
          maximumFractionDigits: 0,
        });

        const lineaPromedio =
          `Promedio de ofrendas por culto: ${formatterCRC.format(
            avgMonto || 0
          )}.`;
        const lineaAsistencia = validAsist.length
          ? `Asistencia promedio: ${avgAsist.toFixed(0)} personas.`
          : `Asistencia promedio: sin datos suficientes.`;
        const lineaTendencia = `Tendencia de las ofrendas: ${tendencia}.`;

        resumenTexto.innerHTML =
          lineaPromedio + "<br>" + lineaAsistencia + "<br>" + lineaTendencia;

        statusEl.textContent = "";
        statusEl.className = "status";
      } catch (err) {
        statusEl.textContent = "❌ Error cargando gráfico: " + err.toString();
        statusEl.className = "status error";
        graficoContainer.style.display = "none";
      }
    }

    // Cambio en el dropdown de tipo de culto dispara el gráfico
    tipoGraficoSelect.addEventListener("change", () => {
      const tipo = tipoGraficoSelect.value;
      cargarYMostrarGrafico(tipo);
    });

    // Botón para ampliar / reducir gráfico (alto + ancho)
    let expanded = false;
    toggleSizeBtn.addEventListener("click", () => {
      expanded = !expanded;
      if (expanded) {
        graficoContainer.classList.add("expanded-chart");
        document.body.classList.add("expanded-layout");
        toggleSizeBtn.textContent = "Reducir gráfico";
      } else {
        graficoContainer.classList.remove("expanded-chart");
        document.body.classList.remove("expanded-layout");
        toggleSizeBtn.textContent = "Ampliar gráfico";
      }
    });
  </script>
</body>
</html>
