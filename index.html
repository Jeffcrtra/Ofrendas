<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>5.05 Registro de Ofrendas – Casa de Oración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin: 0.5rem 0 1rem 0;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .logo img {
      max-width: 180px;
      height: auto;
      border-radius: 8px;
    }
    form {
      background: #ffffff;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input, textarea, select {
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #4a90e2;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:active {
      transform: translateY(1px);
    }
    .btn-guardar {
      background: #4caf50;
      color: #fff;
    }
    .btn-datos {
      background: #1976d2;
      color: #fff;
    }
    .btn-datos[disabled] {
      background: #b0bec5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }
    .status.ok {
      color: #2e7d32;
    }
    .status.error {
      color: #c62828;
    }

    /* Quitar flechas de los inputs numéricos */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    .graphs-container {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: #ffffff;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    #graficoContainer {
      margin-top: 1rem;
      width: 100%;
      height: 360px;
      display: none;
      background: #ffffff;
      border-radius: 12px;
      padding: 0.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    #graficoCanvas {
      width: 100%;
      height: 70%;
    }
    #resumenTexto {
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="CasaDeOracionLogo.jpg" alt="Casa de Oración">
  </div>

  <h1>Registro de Ofrendas</h1>

  <form id="ofrendaForm">
    <!-- Concepto -->
    <label for="conceptoSelect">Concepto</label>
    <select id="conceptoSelect" name="conceptoSelect" required>
      <option value="" disabled selected>Seleccioná un concepto</option>
      <option value="Culto Principal">Culto Principal</option>
      <option value="Culto de Oración">Culto de Oración</option>
      <option value="Otro">Otro</option>
    </select>

    <div id="conceptoOtroContainer" style="display:none; margin-top:0.5rem;">
      <label for="conceptoOtro">Especificar concepto</label>
      <input
        type="text"
        id="conceptoOtro"
        name="conceptoOtro"
        placeholder="Ej: Actividad especial, misioneros..."
      />
    </div>

    <!-- Monto -->
    <label for="monto">Monto (₡)</label>
    <input
      type="number"
      id="monto"
      name="monto"
      required
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
    />

    <!-- Asistencia -->
    <label for="asistencia">Asistencia</label>
    <input
      type="number"
      id="asistencia"
      name="asistencia"
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="Cantidad de personas"
    />

    <!-- Notas -->
    <label for="notas">Notas</label>
    <textarea
      id="notas"
      name="notas"
      placeholder="Detalles adicionales (opcional)"
    ></textarea>

    <button type="submit" class="btn-guardar">Guardar</button>
    <div id="status" class="status"></div>
  </form>

  <!-- Controles de gráfico -->
  <div class="graphs-container">
    <label for="tipoGrafico">Tipo de culto a visualizar</label>
    <select id="tipoGrafico">
      <option value="CO">Culto de Oración (CO)</option>
      <option value="CP">Culto Principal (CP)</option>
    </select>
    <button id="verGraficoBtn" class="btn-datos" disabled>
      Ver gráfico
    </button>
  </div>

  <!-- Contenedor del gráfico en HTML -->
  <div id="graficoContainer">
    <canvas id="graficoCanvas"></canvas>
    <div id="customLegend" style="margin-top:0.5rem; font-size:0.85rem;"></div>
    <div id="resumenTexto"></div>
  </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxGEAdbTqpSQlTBBibm0ulRHyZPj93A83bfeSyWuDG3Hcqmd4IdserjMgIPZjRDvOVW1Q/exec";
  
      const form = document.getElementById("ofrendaForm");
    const statusEl = document.getElementById("status");
    const conceptoSelect = document.getElementById("conceptoSelect");
    const conceptoOtroContainer = document.getElementById("conceptoOtroContainer");
    const conceptoOtroInput = document.getElementById("conceptoOtro");
    const asistenciaInput = document.getElementById("asistencia");
    const tipoGraficoSelect = document.getElementById("tipoGrafico");
    const verGraficoBtn = document.getElementById("verGraficoBtn");
  
    const graficoContainer = document.getElementById("graficoContainer");
    const graficoCanvas = document.getElementById("graficoCanvas");
    const resumenTexto = document.getElementById("resumenTexto");
    const customLegendEl = document.getElementById("customLegend");
  
    let graficoChart = null;
  
    // Config de colores por tipo de culto
    const configPorTipo = {
      CO: {
        label: "Culto de Oración",
        areaColor: "rgba(25, 118, 210, 0.35)",   // azul suave
        borderColor: "rgba(25, 118, 210, 1)",    // azul fuerte
      },
      CP: {
        label: "Culto Principal",
        areaColor: "rgba(239, 108, 0, 0.35)",    // naranja suave
        borderColor: "rgba(239, 108, 0, 1)",     // naranja fuerte
      },
    };
  
    const asistenciaColor = "rgba(46, 125, 50, 1)"; // verde para la línea
  
    // Helper: formatear fecha bonita (viene como "2025-10-07T06:00:00.000Z")
    function formatearFechaLabel(raw) {
      const d = new Date(raw);
      if (!isNaN(d.getTime())) {
        // dd/MM
        return d.toLocaleDateString("es-CR", {
          day: "2-digit",
          month: "2-digit",
        });
      }
      return String(raw);
    }
  
    // Mostrar/ocultar campo "Otro"
    conceptoSelect.addEventListener("change", () => {
      if (conceptoSelect.value === "Otro") {
        conceptoOtroContainer.style.display = "block";
      } else {
        conceptoOtroContainer.style.display = "none";
        conceptoOtroInput.value = "";
      }
    });
  
    // Envío del formulario (registrar ofrenda)
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Enviando...";
      statusEl.className = "status";
  
      const montoRaw = document.getElementById("monto").value;
      const monto = parseInt(montoRaw, 10);
  
      const conceptoSelectValue = conceptoSelect.value;
      const conceptoOtroValue = conceptoOtroInput.value.trim();
  
      const asistenciaRaw = asistenciaInput.value;
      const asistencia = asistenciaRaw ? parseInt(asistenciaRaw, 10) : "";
  
      const notas = document.getElementById("notas").value;
  
      if (isNaN(monto)) {
        statusEl.textContent = "⚠️ El monto debe ser un número entero.";
        statusEl.className = "status error";
        return;
      }
  
      if (!conceptoSelectValue) {
        statusEl.textContent = "⚠️ Debés seleccionar un concepto.";
        statusEl.className = "status error";
        return;
      }
  
      let conceptoFinal = conceptoSelectValue;
      if (conceptoSelectValue === "Otro") {
        if (!conceptoOtroValue) {
          statusEl.textContent =
            "⚠️ Especificá el concepto cuando elijas 'Otro'.";
          statusEl.className = "status error";
          return;
        }
        conceptoFinal = conceptoOtroValue;
      }
  
      const params = new URLSearchParams({
        monto: String(monto),
        concepto: conceptoFinal,
        asistencia: asistencia,
        notas: notas,
      });
  
      try {
        // Registrar ofrenda (no necesitamos leer respuesta)
        await fetch(`${SCRIPT_URL}?${params.toString()}`, {
          method: "GET",
          mode: "no-cors",
        });
  
        statusEl.textContent = "✅ Ofrenda registrada.";
        statusEl.className = "status ok";
        form.reset();
        conceptoOtroContainer.style.display = "none";
  
        // Habilitar botón de gráfico
        verGraficoBtn.disabled = false;
      } catch (err) {
        statusEl.textContent = "❌ Error de conexión: " + err.toString();
        statusEl.className = "status error";
      }
    });
  
    // Cargar pivot desde Apps Script y dibujar gráfico
    async function cargarYMostrarGrafico(tipo) {
      try {
        const cfg = configPorTipo[tipo] || configPorTipo.CO;
        statusEl.textContent = "Cargando gráfico...";
        statusEl.className = "status";
  
        const url = `${SCRIPT_URL}?mode=pivot&tipo=${encodeURIComponent(tipo)}`;
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
  
        const data = await res.json();
        const headers = data.headers || [];
        let rows = data.rows || [];
  
        // Filtrar filas vacías (asumimos: 0=fecha, 1=monto, 2=asistencia)
        rows = rows.filter(
          (r) => r && r[0] !== "" && r[1] !== "" && r[1] != null
        );
  
        if (!rows.length) {
          statusEl.textContent = "⚠️ No hay datos para este gráfico.";
          statusEl.className = "status error";
          graficoContainer.style.display = "none";
          return;
        }
  
        // FORMATEAR FECHAS / LABELS
        const labels = rows.map((r) => formatearFechaLabel(r[0]));
        const valoresMonto = rows.map((r) => Number(r[1]) || 0);
        const valoresAsistencia = rows.map((r) =>
          r.length > 2 ? Number(r[2]) || 0 : 0
        );
  
        graficoContainer.style.display = "block";
  
        // Destruir gráfico previo si existe
        if (graficoChart) {
          graficoChart.destroy();
        }
  
        const ctx = graficoCanvas.getContext("2d");
  
        graficoChart = new Chart(ctx, {
          type: "line", // base: line chart
          data: {
            labels,
            datasets: [
              {
                label: "Ofrendas (₡)",
                data: valoresMonto,
                borderColor: cfg.borderColor,
                backgroundColor: cfg.areaColor,
                borderWidth: 2,
                fill: true,              // área
                stepped: "middle",       // stepped area
                yAxisID: "y",
                tension: 0,              // sin curvas para el escalonado
              },
              {
                label: "Asistencia",
                data: valoresAsistencia,
                borderColor: asistenciaColor,
                backgroundColor: "transparent",
                borderWidth: 2,
                fill: false,             // solo línea
                yAxisID: "y1",
                tension: 0.2,
                pointRadius: 3,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                position: "left",
                title: {
                  display: true,
                  text: "Ofrendas (₡)",
                },
              },
              y1: {
                beginAtZero: true,
                position: "right",
                grid: {
                  drawOnChartArea: false,
                },
                title: {
                  display: true,
                  text: "Asistencia",
                },
              },
            },
            plugins: {
              legend: {
                display: false, // usamos leyenda personalizada
              },
              title: {
                display: true,
                text: cfg.label,
              },
            },
          },
        });
  
        // Leyenda personalizada: arriba ofrendas, abajo asistencia
        customLegendEl.innerHTML = `
          <div style="margin-bottom:2px;">
            <span style="display:inline-block;width:14px;height:10px;background:${cfg.areaColor};border:2px solid ${cfg.borderColor};border-radius:2px;margin-right:4px;"></span>
            Ofrendas (área escalonada)
          </div>
          <div>
            <span style="display:inline-block;width:14px;height:0;border-top:2px solid ${asistenciaColor};margin-right:4px;position:relative;top:-2px;"></span>
            Asistencia (línea verde)
          </div>
        `;
  
        // Texto de análisis
        const sumMonto = valoresMonto.reduce((a, b) => a + b, 0);
        const avgMonto = sumMonto / valoresMonto.length;
  
        const sumAsist = valoresAsistencia.reduce((a, b) => a + b, 0);
        const validAsist = valoresAsistencia.filter((v) => v > 0);
        const avgAsist =
          validAsist.length > 0 ? sumAsist / validAsist.length : 0;
  
        const first = valoresMonto[0];
        const last = valoresMonto[valoresMonto.length - 1];
        let tendencia = "estable";
        if (last > first * 1.1) tendencia = "al alza";
        else if (last < first * 0.9) tendencia = "a la baja";
  
        const formatterCRC = new Intl.NumberFormat("es-CR", {
          style: "currency",
          currency: "CRC",
          maximumFractionDigits: 0,
        });
  
        resumenTexto.textContent =
          `Promedio de ofrendas por culto: ${formatterCRC.format(
            avgMonto || 0
          )}. ` +
          (avgAsist
            ? `Asistencia promedio: ${avgAsist.toFixed(0)} personas. `
            : "") +
          `La tendencia de las ofrendas es ${tendencia}.`;
  
        statusEl.textContent = "";
        statusEl.className = "status";
      } catch (err) {
        statusEl.textContent = "❌ Error cargando gráfico: " + err.toString();
        statusEl.className = "status error";
        graficoContainer.style.display = "none";
      }
    }
  
    // Botón de gráfico
    verGraficoBtn.addEventListener("click", () => {
      const tipo = tipoGraficoSelect.value || "CO";
      cargarYMostrarGrafico(tipo);
    });
  </script>
</body>
</html>
