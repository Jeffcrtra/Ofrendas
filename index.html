<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>3.37 Registro de Ofrendas – Casa de Oración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin: 0.5rem 0 1rem 0;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .logo img {
      max-width: 180px;
      height: auto;
      border-radius: 8px;
    }
    form {
      background: #ffffff;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input, textarea, select {
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #4a90e2;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:active {
      transform: translateY(1px);
    }
    .btn-guardar {
      background: #4caf50;
      color: #fff;
    }
    .btn-datos {
      background: #1976d2;
      color: #fff;
    }
    .btn-datos[disabled] {
      background: #b0bec5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }
    .status.ok {
      color: #2e7d32;
    }
    .status.error {
      color: #c62828;
    }

    /* Quitar flechas de los inputs numéricos */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    .graphs-container {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #graficoContainer {
      margin-top: 1rem;
      width: 100%;
      min-height: 350px;
      display: none;
    }
    #graficoFrame {
      width: 100%;
      height: 350px;
      border: none;
      border-radius: 12px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="CasaDeOracionLogo.jpg" alt="Casa de Oración">
  </div>

  <h1>Registro de Ofrendas</h1>

  <form id="ofrendaForm">
    <!-- Fecha se pone automática en el servidor -->

    <label for="monto">Monto (₡)</label>
    <input
      type="number"
      id="monto"
      name="monto"
      required
      min="0"
      step="1"
      inputmode="numeric"
      pattern="[0-9]*"
    />

    <!-- Nuevo: dropdown de concepto -->
    <label for="conceptoSelect">Concepto</label>
    <select id="conceptoSelect" name="conceptoSelect" required>
      <option value="" disabled selected>Seleccioná un concepto</option>
      <option value="Culto Principal">Culto Principal</option>
      <option value="Culto de Oración">Culto de Oración</option>
      <option value="Otro">Otro</option>
    </select>

    <!-- Campo extra sólo cuando se elige "Otro" -->
    <div id="conceptoOtroContainer" style="display:none; margin-top:0.5rem;">
      <label for="conceptoOtro">Especificar concepto</label>
      <input
        type="text"
        id="conceptoOtro"
        name="conceptoOtro"
        placeholder="Ej: Actividad especial, misioneros..."
      />
    </div>

    <label for="notas">Notas</label>
    <textarea
      id="notas"
      name="notas"
      placeholder="Detalles adicionales (opcional)"
    ></textarea>

    <button type="submit" class="btn-guardar">Guardar</button>

    <div id="status" class="status"></div>
  </form>

  <!-- Botones para ver gráficos -->
  <div class="graphs-container">
    <button id="verCOBtn" class="btn-datos" disabled>
      Ver gráfico CO (Culto de Oración)
    </button>
    <button id="verCPBtn" class="btn-datos" disabled>
      Ver gráfico CP (Culto Principal)
    </button>
  </div>

  <!-- Contenedor donde se muestra el gráfico embebido -->
  <div id="graficoContainer">
    <iframe
      id="graficoFrame"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbyT-ra3bCQUxgEtDpx6rr5D-vXbbBzr9GSs07RgeuJ-bJaJwynfOvyNOubfh_iB2D85NQ/exec";

    // Gráficos publicados
    const GRAPH_CO_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8ApTb9ak2QTSVcswEo0vF655FuLZkmR75CZ2SpmgI0ZD_OtJaEGloAmytg6vJy-g-KovswTV2laHg/pubchart?oid=151386483&format=interactive";

    const GRAPH_CP_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8ApTb9ak2QTSVcswEo0vF655FuLZkmR75CZ2SpmgI0ZD_OtJaEGloAmytg6vJy-g-KovswTV2laHg/pubchart?oid=151386483&format=interactive";

    const form = document.getElementById("ofrendaForm");
    const statusEl = document.getElementById("status");
    const verCOBtn = document.getElementById("verCOBtn");
    const verCPBtn = document.getElementById("verCPBtn");
    const graficoContainer = document.getElementById("graficoContainer");
    const graficoFrame = document.getElementById("graficoFrame");

    const conceptoSelect = document.getElementById("conceptoSelect");
    const conceptoOtroContainer = document.getElementById("conceptoOtroContainer");
    const conceptoOtroInput = document.getElementById("conceptoOtro");

    // Mostrar/ocultar campo "Otro" según selección
    conceptoSelect.addEventListener("change", () => {
      if (conceptoSelect.value === "Otro") {
        conceptoOtroContainer.style.display = "block";
      } else {
        conceptoOtroContainer.style.display = "none";
        conceptoOtroInput.value = "";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Enviando...";
      statusEl.className = "status";

      const montoRaw = document.getElementById("monto").value;
      const monto = parseInt(montoRaw, 10);
      const conceptoSelectValue = conceptoSelect.value;
      const conceptoOtroValue = conceptoOtroInput.value.trim();
      const notas = document.getElementById("notas").value;

      if (isNaN(monto)) {
        statusEl.textContent = "⚠️ El monto debe ser un número entero.";
        statusEl.className = "status error";
        return;
      }

      if (!conceptoSelectValue) {
        statusEl.textContent = "⚠️ Debés seleccionar un concepto.";
        statusEl.className = "status error";
        return;
      }

      let conceptoFinal = conceptoSelectValue;
      if (conceptoSelectValue === "Otro") {
        if (!conceptoOtroValue) {
          statusEl.textContent = "⚠️ Especificá el concepto cuando elijas 'Otro'.";
          statusEl.className = "status error";
          return;
        }
        conceptoFinal = conceptoOtroValue;
      }

      const params = new URLSearchParams({
        monto: String(monto),
        concepto: conceptoFinal,
        notas: notas,
      });

      try {
        await fetch(`${SCRIPT_URL}?${params.toString()}`, {
          method: "GET",
          mode: "no-cors",
        });

        statusEl.textContent = "✅ Ofrenda registrada.";
        statusEl.className = "status ok";
        form.reset();
        conceptoOtroContainer.style.display = "none";

        verCOBtn.disabled = false;
        verCPBtn.disabled = false;
      } catch (err) {
        statusEl.textContent = "❌ Error de conexión: " + err.toString();
        statusEl.className = "status error";
      }
    });

    function mostrarGrafico(url) {
      graficoFrame.src = url;
      graficoContainer.style.display = "block";
    }

    verCOBtn.addEventListener("click", () => {
      mostrarGrafico(GRAPH_CO_URL);
    });

    verCPBtn.addEventListener("click", () => {
      mostrarGrafico(GRAPH_CP_URL);
    });
  </script>
</body>
</html>
